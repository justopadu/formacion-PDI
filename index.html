<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Formaciones PDI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f1f1ef;--surface:#fff;--s2:#f7f7f5;--s3:#efefed;
  --border:rgba(55,53,47,0.09);--border2:rgba(55,53,47,0.16);
  --text:#37352f;--t2:#787774;--t3:#9b9a97;
  --blue:#2383e2;--blue-dark:#1a6fc9;--blue-bg:#e8f3fd;--blue-text:#1565c0;
  --green:#0f7b55;--green-bg:#e8f5f0;
  --amber:#9c6f2e;--amber-bg:#fdf4e7;
  --red:#c0392b;--red-bg:#fdecea;
  --purple-bg:#f4f0fd;--purple-text:#6940a5;
  --teal-bg:#e8f5f2;--teal-text:#0d7a5f;
  --r:6px;--rsm:4px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;}
#loadingScreen.hidden{display:none;}
.spinner{width:30px;height:30px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--t2);}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:48px;position:sticky;top:0;z-index:100;}
.logo{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;}
.hright{display:flex;align-items:center;gap:5px;}
.save-b{font-size:11px;color:var(--t3);padding:3px 8px;background:var(--s2);border-radius:20px;display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* BUTTONS */
.btn{font-family:'Inter',sans-serif;font-size:12px;padding:4px 10px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--surface);color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;height:28px;transition:background .1s;}
.btn:hover{background:var(--s3);color:var(--text);}
.btn.active{background:var(--text);color:#fff;border-color:var(--text);}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500;}
.btn-blue:hover{background:var(--blue-dark);color:#fff;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--s3);}
.btn-danger{color:var(--red);border-color:transparent;background:none;}
.btn-danger:hover{background:var(--red-bg);}

/* TOOLBAR */
.toolbar{padding:10px 18px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
.toolbar input,.toolbar select{font-family:'Inter',sans-serif;font-size:12px;padding:4px 8px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--surface);color:var(--text);height:28px;outline:none;}
.toolbar input{flex:1;min-width:160px;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--blue);}
.view-group{display:flex;gap:3px;background:var(--s3);padding:2px;border-radius:var(--rsm);}
.view-btn{font-size:12px;padding:3px 9px;border-radius:3px;border:none;background:transparent;color:var(--t2);cursor:pointer;height:24px;white-space:nowrap;font-family:'Inter',sans-serif;}
.view-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,0.08);}
.sep{width:1px;height:20px;background:var(--border2);margin:0 4px;}

/* METRICS */
.metrics{padding:8px 18px;display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
.metric{display:flex;align-items:center;gap:7px;padding:4px 10px;background:var(--s2);border-radius:var(--rsm);}
.metric-val{font-size:16px;font-weight:600;line-height:1;}
.metric-label{font-size:11px;color:var(--t3);}

/* MAIN */
.main{padding:14px 18px 40px;}

/* KANBAN */
.board{display:flex;gap:12px;align-items:flex-start;overflow-x:auto;padding-bottom:12px;}
.col{width:270px;flex-shrink:0;}
.col-header{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.col-dot{width:8px;height:8px;border-radius:50%;}
.col-title{font-size:12px;font-weight:600;}
.col-count{font-size:11px;color:var(--t3);background:var(--s3);border-radius:20px;padding:1px 7px;}
.cards-list{display:flex;flex-direction:column;gap:7px;min-height:48px;border-radius:var(--r);padding:2px;transition:background .12s;}
.cards-list.drag-over{background:rgba(35,131,226,0.08);outline:2px dashed rgba(35,131,226,0.3);outline-offset:1px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 11px;cursor:pointer;user-select:none;transition:box-shadow .12s,border-color .12s;}
.card:hover{box-shadow:0 1px 8px rgba(55,53,47,0.1);border-color:var(--border2);}
.card.dragging{opacity:.35;cursor:grabbing;}
.card-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;}
.card-icon{font-size:14px;line-height:1.3;flex-shrink:0;}
.card-name{font-size:13px;font-weight:500;line-height:1.3;flex:1;}
.card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.tag{font-size:10px;font-weight:500;padding:1px 6px;border-radius:3px;}
.tag-A{background:var(--purple-bg);color:var(--purple-text);}
.tag-B{background:var(--teal-bg);color:var(--teal-text);}
.tag-gray{background:var(--s3);color:var(--t2);}
.card-dates{display:grid;grid-template-columns:auto 1fr;gap:2px 7px;margin-bottom:7px;align-items:center;}
.dlbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.dv{font-size:11px;color:var(--t2);}
.dv.c1{color:var(--blue);font-weight:500;}
.dv.c2{color:var(--amber);font-weight:500;}
.card-tasks{margin-bottom:7px;}
.next-task{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--blue);background:var(--blue-bg);padding:4px 7px;border-radius:var(--rsm);}
.task-blocks{display:flex;flex-direction:column;gap:1px;}
.t-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);padding:2px 0;}
.t-row.done{color:var(--t3);}
.t-row.done .t-txt{text-decoration:line-through;}
.chk{width:11px;height:11px;border-radius:2px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chk.on{background:var(--blue);border-color:var(--blue);}
.chk.on::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(0.5px,-0.5px);display:block;}
.pend-tasks{display:flex;flex-direction:column;gap:1px;}
.group-sep{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:5px 0 2px 3px;}
.pdf-bars{display:flex;flex-direction:column;gap:3px;margin-bottom:6px;}
.pdf-row{display:flex;align-items:center;gap:6px;}
.pdf-label{font-size:10px;font-weight:600;color:var(--t3);width:12px;text-align:right;}
.pdf-bar{flex:1;height:4px;background:var(--s3);border-radius:3px;overflow:hidden;}
.pdf-fill{height:100%;border-radius:3px;}
.pdf-pct{font-size:10px;color:var(--t3);min-width:26px;text-align:right;}
.prog-bar{height:3px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.prog-fill{height:100%;border-radius:3px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.prog-pct{font-size:10px;color:var(--t3);}
.add-btn{width:100%;margin-top:4px;padding:6px 10px;font-family:'Inter',sans-serif;font-size:12px;color:var(--t3);background:none;border:1px dashed var(--border2);border-radius:var(--r);cursor:pointer;text-align:left;}
.add-btn:hover{background:var(--surface);color:var(--t2);}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--t2);background:var(--s2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text);}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--s2);cursor:pointer;}
.td-name{font-weight:500;display:flex;align-items:center;gap:6px;}
.sort-arrow{color:var(--t3);font-size:10px;margin-left:3px;}

/* CALENDAR */
.cal-wrap{overflow-x:auto;}
.cal-months{display:flex;flex-direction:column;gap:20px;}
.cal-month-title{font-size:13px;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-header{font-size:10px;font-weight:600;color:var(--t3);text-align:center;padding:3px 0;text-transform:uppercase;}
.cal-day{min-height:60px;padding:4px;border-radius:var(--rsm);background:var(--surface);border:1px solid var(--border);}
.cal-day.empty{background:transparent;border-color:transparent;}
.cal-day.today{border-color:var(--blue);}
.cal-day-num{font-size:10px;color:var(--t3);margin-bottom:3px;font-weight:500;}
.cal-day.today .cal-day-num{color:var(--blue);font-weight:700;}
.cal-evt{font-size:10px;padding:1px 5px;border-radius:2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.evt-inicio{background:#e8f5f0;color:#0f7b55;}
.evt-fin{background:#fdecea;color:#c0392b;}
.evt-conv1{background:var(--blue-bg);color:var(--blue-text);}
.evt-conv2{background:var(--amber-bg);color:var(--amber);}

/* FASES */
.phase-grid{display:flex;flex-direction:column;gap:12px;}
.phase-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.phase-header{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.phase-title{font-size:12px;font-weight:600;}
.phase-count{font-size:11px;color:var(--t3);background:var(--s3);border-radius:20px;padding:1px 7px;}
.phase-cards{display:flex;flex-wrap:wrap;gap:8px;padding:10px 12px;}
.mini-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 10px;cursor:pointer;min-width:160px;max-width:200px;transition:box-shadow .1s;}
.mini-card:hover{box-shadow:0 1px 6px rgba(55,53,47,0.1);}
.mc-name{font-size:12px;font-weight:500;margin-bottom:4px;}
.mc-meta{font-size:10px;color:var(--t3);display:flex;gap:4px;flex-wrap:wrap;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,15,15,0.4);z-index:200;align-items:flex-start;justify-content:center;padding:28px 14px;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--r);border:1px solid var(--border2);padding:20px 22px;width:100%;max-width:520px;margin-bottom:28px;box-shadow:0 4px 24px rgba(15,15,15,0.14);}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.ff{display:flex;flex-direction:column;gap:3px;}
.ff.full{grid-column:1/-1;}
.ff label{font-size:11px;font-weight:500;color:var(--t2);}
.ff input,.ff select{font-family:'Inter',sans-serif;font-size:12px;padding:5px 8px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;height:28px;}
.ff input:focus,.ff select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(35,131,226,0.12);}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0 12px;}
.dates-block{background:var(--s2);border-radius:var(--rsm);padding:11px 12px;margin-bottom:12px;}
.dates-block-title{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px;}
.dates-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.df{display:flex;flex-direction:column;gap:3px;}
.df label{font-size:11px;font-weight:500;color:var(--t2);}
.df input{font-family:'Inter',sans-serif;font-size:12px;padding:5px 8px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;height:28px;}
.df input:focus{border-color:var(--blue);}
.df .hint{font-size:10px;color:var(--t3);}
.conv2-row{display:flex;align-items:center;gap:6px;}
.conv2-tog{font-size:13px;cursor:pointer;color:var(--t3);line-height:1;}
.conv2-tog:hover{color:var(--amber);}
.tasks-lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.grp-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:7px 0 3px 3px;}
.checklist{display:flex;flex-direction:column;gap:1px;}
.ci{display:flex;align-items:center;gap:7px;padding:3px 5px;border-radius:var(--rsm);cursor:pointer;}
.ci:hover{background:var(--s2);}
.ci input[type=checkbox]{width:12px;height:12px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;}
.ci label{font-size:12px;color:var(--text);cursor:pointer;}
.ci label.done{text-decoration:line-through;color:var(--t3);}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.card-mode-group{display:flex;gap:2px;background:var(--s3);padding:2px;border-radius:var(--rsm);}
.card-mode-btn{font-size:11px;padding:2px 7px;border-radius:2px;border:none;background:transparent;color:var(--t2);cursor:pointer;height:22px;font-family:'Inter',sans-serif;}
.card-mode-btn.active{background:var(--surface);color:var(--text);font-weight:500;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;font-size:12px;font-weight:500;padding:7px 15px;border-radius:20px;z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-txt">Conectando con Firebase…</div>
</div>

<div class="header">
  <div class="logo">📚 Formaciones PDI</div>
  <div class="hright">
    <div class="save-b">
      <span class="sync-dot" id="syncDot"></span>
      <span id="saveBadge">Conectando…</span>
    </div>
    <button class="btn btn-blue" onclick="openNew()">+ Nueva</button>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Buscar…" oninput="render()">
  <select id="filtroEje" onchange="render()">
    <option value="">Todos los ejes</option>
    <option value="A">Eje A</option>
    <option value="B">Eje B</option>
  </select>
  <select id="filtroEstado" onchange="render()">
    <option value="">Todos los estados</option>
    <option value="Planificación">Planificación</option>
    <option value="En desarrollo">En desarrollo</option>
    <option value="Finalizado">Finalizado</option>
    <option value="Cerrado">Cerrado</option>
    <option value="Completado">Completado</option>
  </select>
  <div class="sep"></div>
  <div class="view-group">
    <button class="view-btn active" id="vb-kanban" onclick="setView('kanban')">⊞ Kanban</button>
    <button class="view-btn" id="vb-tabla" onclick="setView('tabla')">☰ Tabla</button>
    <button class="view-btn" id="vb-calendario" onclick="setView('calendario')">📅 Calendario</button>
    <button class="view-btn" id="vb-fases" onclick="setView('fases')">⬡ Fases</button>
  </div>
  <div class="sep"></div>
  <div id="card-mode-wrap" style="display:flex;align-items:center;gap:5px;">
    <span style="font-size:11px;color:var(--t3);">Tarjetas:</span>
    <div class="card-mode-group">
      <button class="card-mode-btn active" id="cm-next" onclick="setCardMode('next')">Siguiente tarea</button>
      <button class="card-mode-btn" id="cm-pend" onclick="setCardMode('pend')">Pendientes</button>
      <button class="card-mode-btn" id="cm-all" onclick="setCardMode('all')">Todas</button>
      <button class="card-mode-btn" id="cm-pdf" onclick="setCardMode('pdf')">P/D/F</button>
    </div>
  </div>
</div>

<div class="metrics" id="metrics"></div>
<div class="main" id="main"></div>

<!-- MODAL -->
<div class="overlay" id="cardOverlay">
<div class="modal">
  <div class="modal-title" id="mTitle">Nueva formación</div>
  <div class="fg">
    <div class="ff full"><label>Nombre</label><input id="f-nombre" placeholder="ej. Inteligencia emocional"></div>
    <div class="ff"><label>Eje</label><select id="f-eje"><option value="A">Eje A</option><option value="B">Eje B</option></select></div>
    <div class="ff"><label>Itinerario</label><input id="f-itinerario" placeholder="A2"></div>
    <div class="ff"><label>Formador/a</label><input id="f-formador" placeholder="Nombre"></div>
    <div class="ff"><label>ECTS</label><input id="f-ects" type="number" step="0.5" min="0" placeholder="2"></div>
    <div class="ff"><label>Estado</label>
      <select id="f-estado">
        <option value="Planificación">Planificación</option>
        <option value="En desarrollo">En desarrollo</option>
        <option value="Finalizado">Finalizado</option>
        <option value="Cerrado">Cerrado</option>
        <option value="Completado">Completado</option>
      </select>
    </div>
  </div>
  <hr class="divider">
  <div class="dates-block">
    <div class="dates-block-title">Fechas</div>
    <div class="dates-grid">
      <div class="df"><label>Inicio (1ª sesión)</label><input id="f-inicio" type="date"><span class="hint">Primera sesión</span></div>
      <div class="df"><label>Fin (última sesión)</label><input id="f-fin" type="date"><span class="hint">Última sesión</span></div>
      <div class="df"><label>Entrega 1ª conv.</label><input id="f-conv1" type="date" style="border-color:rgba(35,131,226,0.3)"><span class="hint">Fecha límite entrega</span></div>
      <div class="df">
        <div class="conv2-row"><label>Entrega 2ª conv.</label><span class="conv2-tog" id="conv2tog" onclick="toggleConv2()" title="Activar/desactivar">＋</span></div>
        <input id="f-conv2" type="date" disabled style="opacity:.4;cursor:not-allowed;border-color:rgba(156,111,46,0.3)">
        <span class="hint">Fecha límite 2ª oportunidad</span>
      </div>
    </div>
  </div>
  <div class="tasks-lbl">Seguimiento de tareas</div>
  <div id="checklist-modal" class="checklist"></div>
  <div class="modal-footer">
    <button class="btn btn-danger" id="btnDel" style="display:none;">Eliminar</button>
    <div style="display:flex;gap:7px;margin-left:auto;">
      <button class="btn" onclick="closeCard()">Cancelar</button>
      <button class="btn btn-blue" id="btnSave" onclick="saveCard()">Guardar</button>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc,
  onSnapshot, addDoc, updateDoc, deleteDoc,
  query, orderBy, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── FIREBASE CONFIG ──────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyByZojr-fOhTApZLZrt7sSu9etgmHEmtMw",
  authDomain: "formacion-pdi-2026.firebaseapp.com",
  projectId: "formacion-pdi-2026",
  storageBucket: "formacion-pdi-2026.firebasestorage.app",
  messagingSenderId: "105033365155",
  appId: "1:105033365155:web:9475070b537ffcfaf8b116",
  measurementId: "G-ECW2FGPSTM"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const col = collection(db, 'formaciones');

// ── CONSTANTS ────────────────────────────────────────
const TP=['P1 - Buscar formador','P2 - Cerrar fechas y ECTS','P3 - Ficha descriptiva','P4 - Enviar guía','P5 - Preparar Módulo','P6 - Formulario Inscripción','P7 - Inscribir en grupos aula','P8 - Comunicar Inscripción'];
const TD=['D1 - Recordatorios sesiones','D2 - Presentar 1ª sesión','D3 - Formulario Satisfacción'];
const TF=['F1 - Control Asistencia','F2 - Aptos','F3 - Generar certificados D','F4 - Enviar certificados D','F5 - Generar certificados F','F6 - Enviar certificados F','F7 - Subir datos a histórico','F8 - Datos satisfacción','F9 - Pago formador'];
const AT=[...TP,...TD,...TF];
const COLS=[{id:'Planificación',dot:'#9b9a97'},{id:'En desarrollo',dot:'#2383e2'},{id:'Finalizado',dot:'#e67e22'},{id:'Cerrado',dot:'#787774'},{id:'Completado',dot:'#0f7b55'}];
const ICONS=['📋','🎙','🎮','🧠','🤖','🌱','📚','🎓','💡','🔬','🎯','🖥','🎨','🧩','🏆'];
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const MSHORT=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

// ── STATE ────────────────────────────────────────────
let data=[], editId=null, conv2en=false, dragId=null;
let currentView='kanban', cardMode='next', sortCol=null, sortDir=1;

// ── SYNC UI ──────────────────────────────────────────
function setSyncStatus(state, msg){
  document.getElementById('syncDot').className='sync-dot '+state;
  document.getElementById('saveBadge').textContent=msg;
}

// ── REALTIME LISTENER ────────────────────────────────
// onSnapshot escucha cambios en tiempo real: todos los usuarios ven
// los datos actualizados automáticamente sin recargar la página.
const q = query(col, orderBy('createdAt','asc'));
onSnapshot(q, snap => {
  data = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
  document.getElementById('loadingScreen').classList.add('hidden');
  setSyncStatus('ok','Sincronizado ✓');
  render();
}, err => {
  console.error(err);
  document.getElementById('loadingScreen').classList.add('hidden');
  setSyncStatus('err','Error de conexión');
  showToast('Error al conectar con Firebase');
});

// ── HELPERS ──────────────────────────────────────────
function mkT(){ return AT.map(t=>({t,done:false})); }
function pct(tasks){ if(!tasks?.length)return 0; return Math.round(tasks.filter(x=>x.done).length/tasks.length*100); }
function pctBlock(tasks,prefix){ const bl=tasks.filter(t=>t.t.startsWith(prefix)); return bl.length?Math.round(bl.filter(t=>t.done).length/bl.length*100):0; }
function barColor(p){ return p===100?'#0f7b55':p>=60?'#2383e2':p>=25?'#e67e22':'#d4d4d0'; }
function fmtD(d){ if(!d)return''; const[,m,day]=d.split('-'); return`${parseInt(day)} ${MSHORT[parseInt(m)-1]}`; }
function fmtDLong(d){ if(!d)return''; const[y,m,day]=d.split('-'); return`${parseInt(day)} ${MSHORT[parseInt(m)-1]} ${y}`; }
function autoEstado(tasks,estadoActual){
  if(!tasks?.length)return estadoActual;
  const doneP=tasks.filter(t=>t.t.startsWith('P')).every(t=>t.done);
  const doneD=tasks.filter(t=>t.t.startsWith('D')).every(t=>t.done);
  const doneF=tasks.filter(t=>t.t.startsWith('F')).every(t=>t.done);
  if(doneP&&doneD&&doneF)return'Completado';
  if(doneP&&doneD)return'Finalizado';
  if(doneP)return'En desarrollo';
  return estadoActual;
}

// ── FILTERS ──────────────────────────────────────────
function filtered(){
  const q=document.getElementById('search').value.toLowerCase();
  const eje=document.getElementById('filtroEje').value;
  const est=document.getElementById('filtroEstado').value;
  return data.filter(c=>
    (!q||(c.nombre.toLowerCase().includes(q)||(c.formador||'').toLowerCase().includes(q)))
    &&(!eje||c.eje===eje)
    &&(!est||c.estado===est)
  );
}

// ── METRICS ──────────────────────────────────────────
function renderMetrics(){
  const tot=data.length, dev=data.filter(x=>x.estado==='En desarrollo').length;
  const done=data.filter(x=>['Finalizado','Cerrado','Completado'].includes(x.estado)).length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-val">${tot}</div><div class="metric-label">Total</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--blue)">${dev}</div><div class="metric-label">En desarrollo</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--green)">${done}</div><div class="metric-label">Finalizadas</div></div>`;
}

// ── VIEWS ─────────────────────────────────────────────
function setView(v){
  currentView=v;
  ['kanban','tabla','calendario','fases'].forEach(x=>document.getElementById('vb-'+x).classList.toggle('active',x===v));
  document.getElementById('card-mode-wrap').style.display=v==='kanban'?'flex':'none';
  render();
}
function setCardMode(m){
  cardMode=m;
  ['next','pend','all','pdf'].forEach(x=>document.getElementById('cm-'+x).classList.toggle('active',x===m));
  render();
}
function render(){
  renderMetrics();
  const main=document.getElementById('main');
  if(currentView==='kanban')renderKanban(main);
  else if(currentView==='tabla')renderTable(main);
  else if(currentView==='calendario')renderCalendar(main);
  else renderFases(main);
}

// ── CARD TASK DISPLAY ─────────────────────────────────
function cardTasksHTML(c){
  const tasks=c.tasks||[];
  if(cardMode==='next'){
    const next=tasks.find(t=>!t.done);
    return`<div class="card-tasks"><div class="next-task">${next?'→ '+next.t:'✓ Todas las tareas completadas'}</div></div>`;
  }
  if(cardMode==='pend'){
    const pend=tasks.filter(t=>!t.done);
    if(!pend.length)return`<div class="card-tasks"><div class="next-task">✓ Sin tareas pendientes</div></div>`;
    let html='<div class="card-tasks"><div class="pend-tasks">';
    [{l:'P',label:'Plan.'},{l:'D',label:'Des.'},{l:'F',label:'Fin.'}].forEach(g=>{
      const items=pend.filter(t=>t.t.startsWith(g.l)); if(!items.length)return;
      html+=`<div class="group-sep">${g.label}</div>`;
      items.forEach(t=>{html+=`<div class="t-row"><div class="chk"></div><span class="t-txt">${t.t}</span></div>`;});
    });
    return html+'</div></div>';
  }
  if(cardMode==='all'){
    let html='<div class="card-tasks"><div class="task-blocks">';
    [{l:'P',label:'Planificación'},{l:'D',label:'Desarrollo'},{l:'F',label:'Finalización'}].forEach(g=>{
      const items=tasks.filter(t=>t.t.startsWith(g.l)); if(!items.length)return;
      html+=`<div class="group-sep">${g.label}</div>`;
      items.forEach(t=>{html+=`<div class="t-row ${t.done?'done':''}"><div class="chk ${t.done?'on':''}"></div><span class="t-txt">${t.t}</span></div>`;});
    });
    return html+'</div></div>';
  }
  if(cardMode==='pdf'){
    const pp=pctBlock(tasks,'P'),pd=pctBlock(tasks,'D'),pf=pctBlock(tasks,'F');
    return`<div class="pdf-bars">
      <div class="pdf-row"><span class="pdf-label">P</span><div class="pdf-bar"><div class="pdf-fill" style="width:${pp}%;background:${barColor(pp)}"></div></div><span class="pdf-pct">${pp}%</span></div>
      <div class="pdf-row"><span class="pdf-label">D</span><div class="pdf-bar"><div class="pdf-fill" style="width:${pd}%;background:${barColor(pd)}"></div></div><span class="pdf-pct">${pd}%</span></div>
      <div class="pdf-row"><span class="pdf-label">F</span><div class="pdf-bar"><div class="pdf-fill" style="width:${pf}%;background:${barColor(pf)}"></div></div><span class="pdf-pct">${pf}%</span></div>
    </div>`;
  }
  return'';
}

// ── BUILD CARD ────────────────────────────────────────
function buildCard(c){
  const p=pct(c.tasks||[]);
  let tags=`<span class="tag tag-${c.eje}">${c.itinerario||c.eje}</span>`;
  if(c.ects)tags+=`<span class="tag tag-gray">${c.ects} ECTS</span>`;
  let dates='';
  if(c.inicio||c.fin)dates+=`<span class="dlbl">Sesiones</span><span class="dv">${fmtD(c.inicio)||'—'}${c.fin?' → '+fmtD(c.fin):''}</span>`;
  if(c.conv1)dates+=`<span class="dlbl">Conv.1</span><span class="dv c1">${fmtD(c.conv1)}</span>`;
  if(c.conv2)dates+=`<span class="dlbl">Conv.2</span><span class="dv c2">${fmtD(c.conv2)}</span>`;
  if(c.formador)dates+=`<span class="dlbl">Form.</span><span class="dv">${c.formador}</span>`;
  const div=document.createElement('div');
  div.className='card'; div.draggable=true;
  div.innerHTML=`
    <div class="card-top"><span class="card-icon">${c.icon||'📋'}</span><span class="card-name">${c.nombre}</span></div>
    <div class="card-tags">${tags}</div>
    ${dates?`<div class="card-dates">${dates}</div>`:''}
    ${cardTasksHTML(c)}
    <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${barColor(p)}"></div></div>
    <div class="card-footer"><span class="prog-pct">${p}% completado</span></div>`;
  div.addEventListener('dragstart',()=>{dragId=c.firestoreId; div.classList.add('dragging');});
  div.addEventListener('dragend',()=>{dragId=null; div.classList.remove('dragging');});
  div.addEventListener('click',()=>openEdit(c.firestoreId));
  return div;
}

// ── KANBAN ────────────────────────────────────────────
function renderKanban(main){
  main.innerHTML='';
  const board=document.createElement('div'); board.className='board';
  const filt=filtered();
  COLS.forEach(col=>{
    const cards=filt.filter(c=>c.estado===col.id);
    const colEl=document.createElement('div'); colEl.className='col';
    colEl.innerHTML=`<div class="col-header"><div class="col-dot" style="background:${col.dot}"></div><span class="col-title">${col.id}</span><span class="col-count">${cards.length}</span></div>`;
    const list=document.createElement('div'); list.className='cards-list'; list.dataset.col=col.id;
    list.addEventListener('dragover',e=>{e.preventDefault(); list.classList.add('drag-over');});
    list.addEventListener('dragleave',()=>list.classList.remove('drag-over'));
    list.addEventListener('drop',async e=>{
      e.preventDefault(); list.classList.remove('drag-over');
      if(dragId){
        setSyncStatus('syncing','Guardando…');
        try{ await updateDoc(doc(db,'formaciones',dragId),{estado:col.id}); showToast('Movido a "'+col.id+'"'); }
        catch(err){ setSyncStatus('err','Error'); showToast('Error al mover'); }
      }
    });
    cards.forEach(c=>list.appendChild(buildCard(c)));
    const ab=document.createElement('button'); ab.className='add-btn'; ab.textContent='+ Nueva formación'; ab.onclick=()=>openNew(col.id);
    colEl.appendChild(list); colEl.appendChild(ab); board.appendChild(colEl);
  });
  main.appendChild(board);
}

// ── TABLE ─────────────────────────────────────────────
function renderTable(main){
  main.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='table-wrap';
  let rows=filtered();
  if(sortCol){
    rows=[...rows].sort((a,b)=>{
      if(sortCol==='pct')return(pct(a.tasks||[])-pct(b.tasks||[]))*sortDir;
      return String(a[sortCol]||'').localeCompare(String(b[sortCol]||''))*sortDir;
    });
  }
  const cols2=[
    {key:'nombre',label:'Nombre'},{key:'estado',label:'Estado'},{key:'itinerario',label:'Itinerario'},
    {key:'formador',label:'Formador/a'},{key:'inicio',label:'Inicio'},{key:'fin',label:'Fin'},
    {key:'conv1',label:'Conv. 1'},{key:'conv2',label:'Conv. 2'},{key:'ects',label:'ECTS'},
    {key:'pct',label:'% Completado'},{key:'tasks',label:'Tareas pendientes'},
  ];
  const table=document.createElement('table');
  const hrow=document.createElement('tr');
  cols2.forEach(col=>{
    const th=document.createElement('th');
    th.innerHTML=col.label+`<span class="sort-arrow">${sortCol===col.key?(sortDir===1?' ↑':' ↓'):''}</span>`;
    if(col.key!=='tasks')th.onclick=()=>{sortCol===col.key?sortDir*=-1:(sortCol=col.key,sortDir=1); renderTable(main);};
    hrow.appendChild(th);
  });
  const thead=document.createElement('thead'); thead.appendChild(hrow); table.appendChild(thead);
  const tbody=document.createElement('tbody');
  rows.forEach(c=>{
    const tr=document.createElement('tr'); tr.onclick=()=>openEdit(c.firestoreId);
    const p=pct(c.tasks||[]);
    const pend=(c.tasks||[]).filter(t=>!t.done);
    const sc={Planificación:'var(--t3)','En desarrollo':'var(--blue)',Finalizado:'var(--amber)',Cerrado:'var(--t2)',Completado:'var(--green)'}[c.estado]||'var(--t2)';
    [
      `<div class="td-name"><span>${c.icon||'📋'}</span>${c.nombre}</div>`,
      `<span style="color:${sc};font-weight:500">${c.estado}</span>`,
      `<span class="tag tag-${c.eje}" style="display:inline-block">${c.itinerario||c.eje}</span>`,
      c.formador||'—', fmtDLong(c.inicio)||'—', fmtDLong(c.fin)||'—',
      c.conv1?`<span style="color:var(--blue);font-weight:500">${fmtDLong(c.conv1)}</span>`:'—',
      c.conv2?`<span style="color:var(--amber);font-weight:500">${fmtDLong(c.conv2)}</span>`:'—',
      c.ects||'—',
      `<div style="display:flex;align-items:center;gap:6px"><div style="width:60px;height:4px;background:var(--s3);border-radius:3px;overflow:hidden"><div style="width:${p}%;height:100%;background:${barColor(p)};border-radius:3px"></div></div><span style="font-size:11px;color:var(--t3)">${p}%</span></div>`,
      `<div>${pend.slice(0,3).map(t=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;padding:1px 0"><div style="width:10px;height:10px;border-radius:2px;border:1.5px solid var(--border2);flex-shrink:0"></div><span>${t.t}</span></div>`).join('')}${pend.length>3?`<div style="font-size:10px;color:var(--t3)">+${pend.length-3} más</div>`:''}</div>`,
    ].forEach(html=>{const td=document.createElement('td'); td.innerHTML=html; tr.appendChild(td);});
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); wrap.appendChild(table); main.appendChild(wrap);
}

// ── CALENDAR ──────────────────────────────────────────
function renderCalendar(main){
  main.innerHTML='';
  const filt=filtered(), today=new Date();
  const allDates=[];
  filt.forEach(c=>['inicio','fin','conv1','conv2'].forEach(k=>{if(c[k])allDates.push(new Date(c[k]));}));
  allDates.push(today);
  const minD=new Date(Math.min(...allDates.map(d=>d.getTime())));
  const maxD=new Date(Math.max(...allDates.map(d=>d.getTime())));
  minD.setDate(1); maxD.setMonth(maxD.getMonth()+1); maxD.setDate(1);
  const months=[]; let cur=new Date(minD);
  while(cur<maxD){months.push(new Date(cur)); cur.setMonth(cur.getMonth()+1);}
  const calDiv=document.createElement('div'); calDiv.className='cal-months';
  months.forEach(month=>{
    const mDiv=document.createElement('div'); mDiv.className='cal-month';
    mDiv.innerHTML=`<div class="cal-month-title">${MONTHS[month.getMonth()]} ${month.getFullYear()}</div>`;
    const grid=document.createElement('div'); grid.className='cal-grid';
    DAYS.forEach(d=>{const dh=document.createElement('div'); dh.className='cal-day-header'; dh.textContent=d; grid.appendChild(dh);});
    const firstDay=(month.getDay()+6)%7;
    for(let i=0;i<firstDay;i++){const e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e);}
    const dim=new Date(month.getFullYear(),month.getMonth()+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const dayEl=document.createElement('div'); dayEl.className='cal-day';
      if(today.getDate()===d&&today.getMonth()===month.getMonth()&&today.getFullYear()===month.getFullYear())dayEl.classList.add('today');
      const dn=document.createElement('div'); dn.className='cal-day-num'; dn.textContent=d; dayEl.appendChild(dn);
      const ds=`${month.getFullYear()}-${String(month.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      filt.forEach(c=>{
        const evts=[[c.inicio,'evt-inicio','▶'],[c.fin,'evt-fin','■'],[c.conv1,'evt-conv1','C1'],[c.conv2,'evt-conv2','C2']];
        evts.forEach(([date,cls,prefix])=>{
          if(date===ds){const e=document.createElement('div'); e.className='cal-evt '+cls; e.textContent=prefix+' '+c.nombre; e.onclick=ev=>{ev.stopPropagation(); openEdit(c.firestoreId);}; dayEl.appendChild(e);}
        });
      });
      grid.appendChild(dayEl);
    }
    mDiv.appendChild(grid);
    mDiv.insertAdjacentHTML('beforeend','<div style="display:flex;gap:10px;margin-top:7px;flex-wrap:wrap"><span class="cal-evt evt-inicio" style="font-size:10px">▶ Inicio</span><span class="cal-evt evt-fin" style="font-size:10px">■ Fin</span><span class="cal-evt evt-conv1" style="font-size:10px">C1 1ª conv.</span><span class="cal-evt evt-conv2" style="font-size:10px">C2 2ª conv.</span></div>');
    calDiv.appendChild(mDiv);
  });
  main.appendChild(calDiv);
}

// ── FASES ─────────────────────────────────────────────
function renderFases(main){
  main.innerHTML='';
  const filt=filtered();
  const grid=document.createElement('div'); grid.className='phase-grid';
  AT.forEach(task=>{
    const inTask=filt.filter(c=>{const t=c.tasks?.find(x=>x.t===task); return t&&!t.done;});
    if(!inTask.length)return;
    const grp=document.createElement('div'); grp.className='phase-group';
    grp.innerHTML=`<div class="phase-header"><span class="phase-title">${task}</span><span class="phase-count">${inTask.length}</span></div>`;
    const cards=document.createElement('div'); cards.className='phase-cards';
    inTask.forEach(c=>{
      const p=pct(c.tasks||[]);
      const mc=document.createElement('div'); mc.className='mini-card';
      mc.innerHTML=`<div class="mc-name">${c.icon||'📋'} ${c.nombre}</div><div class="mc-meta"><span class="tag tag-${c.eje}" style="font-size:10px">${c.itinerario||c.eje}</span><span style="color:${barColor(p)};font-size:10px">${p}%</span>${c.formador?`<span>${c.formador}</span>`:''}</div>`;
      mc.onclick=()=>openEdit(c.firestoreId);
      cards.appendChild(mc);
    });
    grp.appendChild(cards); grid.appendChild(grp);
  });
  if(!grid.childNodes.length)grid.innerHTML='<p style="color:var(--t3);font-size:13px;padding:20px 0">No hay tareas pendientes con los filtros actuales.</p>';
  main.appendChild(grid);
}

// ── MODAL ─────────────────────────────────────────────
function buildCL(tasks){
  const el=document.getElementById('checklist-modal'); el.innerHTML='';
  [{label:'Planificación',p:'P'},{label:'Desarrollo',p:'D'},{label:'Finalización',p:'F'}].forEach(g=>{
    const items=tasks.filter(t=>t.t.startsWith(g.p)); if(!items.length)return;
    const gl=document.createElement('div'); gl.className='grp-lbl'; gl.textContent=g.label; el.appendChild(gl);
    items.forEach(item=>{
      const div=document.createElement('div'); div.className='ci';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=item.done;
      const uid='cl-'+item.t.replace(/\W+/g,'_'); cb.id=uid;
      const lbl=document.createElement('label'); lbl.htmlFor=uid; lbl.textContent=item.t;
      if(item.done)lbl.className='done';
      cb.onchange=()=>{item.done=cb.checked; lbl.className=cb.checked?'done':'';};
      div.appendChild(cb); div.appendChild(lbl); el.appendChild(div);
    });
  });
}
function setConv2(en){
  conv2en=en;
  const inp=document.getElementById('f-conv2'), tog=document.getElementById('conv2tog');
  inp.disabled=!en; inp.style.opacity=en?'1':'0.4'; inp.style.cursor=en?'':'not-allowed';
  tog.textContent=en?'－':'＋'; tog.style.color=en?'var(--amber)':'var(--t3)';
  if(!en)inp.value='';
}
function toggleConv2(){ setConv2(!conv2en); }

function openNew(estado){
  editId=null;
  document.getElementById('mTitle').textContent='Nueva formación';
  document.getElementById('btnDel').style.display='none';
  ['nombre','formador','itinerario','ects'].forEach(f=>document.getElementById('f-'+f).value='');
  document.getElementById('f-eje').value='A';
  document.getElementById('f-estado').value=estado||'Planificación';
  ['f-inicio','f-fin','f-conv1','f-conv2'].forEach(f=>document.getElementById(f).value='');
  buildCL(mkT()); setConv2(false);
  document.getElementById('cardOverlay').classList.add('open');
}
function openEdit(firestoreId){
  const c=data.find(x=>x.firestoreId===firestoreId); if(!c)return;
  editId=firestoreId;
  document.getElementById('mTitle').textContent=c.nombre;
  document.getElementById('btnDel').style.display='block';
  document.getElementById('f-nombre').value=c.nombre;
  document.getElementById('f-eje').value=c.eje;
  document.getElementById('f-itinerario').value=c.itinerario||'';
  document.getElementById('f-formador').value=c.formador||'';
  document.getElementById('f-estado').value=c.estado;
  document.getElementById('f-ects').value=c.ects||'';
  document.getElementById('f-inicio').value=c.inicio||'';
  document.getElementById('f-fin').value=c.fin||'';
  document.getElementById('f-conv1').value=c.conv1||'';
  document.getElementById('f-conv2').value=c.conv2||'';
  buildCL(c.tasks||mkT()); setConv2(!!(c.conv2));
  document.getElementById('cardOverlay').classList.add('open');
}
function getT(){
  const el=document.getElementById('checklist-modal');
  return AT.map(t=>{const cb=el.querySelector('#cl-'+t.replace(/\W+/g,'_')); return{t,done:cb?cb.checked:false};});
}

async function saveCard(){
  const nombre=document.getElementById('f-nombre').value.trim();
  if(!nombre){alert('El nombre es obligatorio.'); return;}
  const tasks=getT();
  const estadoManual=document.getElementById('f-estado').value;
  const estadoAuto=autoEstado(tasks,estadoManual);
  const ORDEN=['Planificación','En desarrollo','Finalizado','Completado'];
  const estadoFinal=ORDEN.indexOf(estadoAuto)>ORDEN.indexOf(estadoManual)?estadoAuto:estadoManual;
  const rec={
    nombre, eje:document.getElementById('f-eje').value,
    itinerario:document.getElementById('f-itinerario').value,
    formador:document.getElementById('f-formador').value,
    estado:estadoFinal, ects:parseFloat(document.getElementById('f-ects').value)||0,
    inicio:document.getElementById('f-inicio').value,
    fin:document.getElementById('f-fin').value,
    conv1:document.getElementById('f-conv1').value,
    conv2:conv2en?document.getElementById('f-conv2').value:'',
    tasks
  };
  const btn=document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='Guardando…';
  setSyncStatus('syncing','Guardando…');
  try{
    if(editId){
      rec.icon=data.find(x=>x.firestoreId===editId)?.icon||'📋';
      await updateDoc(doc(db,'formaciones',editId),rec);
      if(estadoFinal!==estadoManual)showToast('Estado → "'+estadoFinal+'" automáticamente');
      else showToast('Guardado');
    } else {
      rec.icon=ICONS[Math.floor(Math.random()*ICONS.length)];
      rec.createdAt=serverTimestamp();
      await addDoc(col,rec);
      showToast('Formación creada');
    }
    closeCard();
  } catch(err){ setSyncStatus('err','Error'); showToast('Error: '+err.message); }
  btn.disabled=false; btn.textContent='Guardar';
}

async function deleteCard(){
  if(!editId)return;
  if(!confirm('¿Eliminar esta formación?'))return;
  setSyncStatus('syncing','Eliminando…');
  try{ await deleteDoc(doc(db,'formaciones',editId)); closeCard(); showToast('Eliminada'); }
  catch(err){ setSyncStatus('err','Error'); showToast('Error: '+err.message); }
}

function closeCard(){ document.getElementById('cardOverlay').classList.remove('open'); editId=null; }
document.getElementById('cardOverlay').addEventListener('click',function(e){if(e.target===this)closeCard();});
document.getElementById('btnDel').addEventListener('click',deleteCard);

// ── EXPOSE TO GLOBAL (onclick en HTML necesita acceso fuera del module)
window.openNew=openNew; window.closeCard=closeCard; window.saveCard=saveCard;
window.setView=setView; window.setCardMode=setCardMode; window.toggleConv2=toggleConv2; window.render=render;
window.showToast=msg=>{
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
};
</script>
